# Render Blueprint — Customer Intelligence Platform API
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: cip-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: API_SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://your-frontend.netlify.app,http://localhost:8080
      - key: MLFLOW_TRACKING_URI
        value: http://localhost:5000
      - key: LLM_PROVIDER
        value: local
      - key: LOG_LEVEL
        value: INFO
    autoDeploy: true
