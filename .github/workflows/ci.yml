name: CI — Customer Intelligence Platform

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/cip-api

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint deps
        run: pip install ruff mypy

      - name: Ruff lint
        run: ruff check app/ tests/

      - name: Ruff format check
        run: ruff format --check app/ tests/

  # ── Unit & Integration Tests ─────────────────────────────────────────────────
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create required directories
        run: mkdir -p data/raw data/processed data/complaints models reports/drift logs mlruns

      - name: Run tests with coverage
        env:
          APP_ENV: test
          MLFLOW_TRACKING_URI: sqlite:///mlruns/test.db
          MODEL_PATH: models/test_model.pkl
          FAISS_INDEX_PATH: models/test_faiss
          LLM_PROVIDER: local
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=term-missing \
            --tb=short \
            -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: backend/reports/coverage.xml
          fail_ci_if_error: false

  # ── ML Promotion Gate ────────────────────────────────────────────────────────
  ml-gate:
    name: ML Promotion Gate (AUC ≥ 0.75)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ML pipeline & check AUC gate
        env:
          APP_ENV: ci
          MLFLOW_TRACKING_URI: sqlite:///mlruns/ci.db
          MODEL_PATH: models/ci_model.pkl
          PROMOTION_AUC_GATE: "0.75"
          LLM_PROVIDER: local
        run: |
          python - <<'EOF'
          import sys, os
          sys.path.insert(0, ".")
          os.makedirs("data/processed", exist_ok=True)
          os.makedirs("models", exist_ok=True)
          os.makedirs("mlruns", exist_ok=True)
          from app.ml.pipeline import run_ml_pipeline
          result = run_ml_pipeline(force_promote=False)
          auc = result["metrics"]["auc_roc"]
          print(f"AUC-ROC: {auc:.4f}")
          gate = float(os.environ.get("PROMOTION_AUC_GATE", "0.75"))
          if auc < gate:
              print(f"GATE FAILED: {auc:.4f} < {gate}")
              sys.exit(1)
          print(f"GATE PASSED: {auc:.4f} >= {gate}")
          EOF

  # ── Docker Build & Push ──────────────────────────────────────────────────────
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [test, ml-gate]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}
